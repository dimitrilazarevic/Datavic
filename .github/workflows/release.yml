name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm install @rolldown/binding-win32-x64-msvc

      - name: Build SvelteKit + Electron
        run: npm run build

      - name: Package
        run: npx electron-builder --publish never

      - name: Rename artifacts
        run: |
          Get-ChildItem dist -File | Where-Object { $_.Name -match ' ' } | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            Rename-Item $_.FullName $newName
          }
        shell: pwsh

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} dist/*.exe dist/*.yml dist/*.blockmap --title "${{ github.ref_name }}" --generate-notes
